<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/taskbar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="website icon" type="png" href="static/images/icon-tech-shop.png">
</head>
<body>
    <nav>
        <div class="nav">
            <div class="techshop">
                <p>
                    Techshop
                </p>
            </div>
            <div class="sarech-box">
                <input type="text" placeholder="Sarech Product..." class="sarech">
                <button class="sarech-but">
                    Sarech
                </button>
            </div>
            <div class="mobile-menu-button">|||</div>
            <div class="links">
                <a href="#"><p>Contact</p></a>
                <a href="#" id="About-taskpar"><p>About</p></a>
            </div>
        </div>

    </nav>
    <header>
        <div class="welcome">
            <h1 style="margin: 30px 0px 0px 0px;">
                Welcome to Uor Store
            </h1>
            <p>Discover amazing product at unbealable price </p>
            <button class="but-shop">
                Shop now
            </button>
        </div>
    </header>
    <main>
        <section>
            <div class="products">
                <div class="product">
                    <img src="static/images/galaxy-s25-ultra.jpg" alt="image not found">
                    <div class="pro-p">
                        <h3>Samsung Galaxy s25 ultra</h3>
                        <p>$1200</p>
                    </div>
                </div>
                <div class="product">
                    <img src="static/images/headphones.jpg" alt="image not found">
                    <div class="pro-p">
                        <h3>Apple Airpods</h3>
                        <p>$300</p>
                    </div>
                </div>
                <div class="product">
                    <img src="static/images/iphone-15.jpg" alt="image not found">
                    <div class="pro-p">
                        <h3>iPhone 15 mini</h3>
                        <p>$600</p>
                    </div>
                </div>
                <div class="product">
                    <img src="static/images/ps5.jpg" alt="image not found">
                    <div class="pro-p">
                        <h3>Playe station 5</h3>
                        <p>$100</p>
                    </div>
                </div>
                <div class="product">
                    <img src="static/images/smatr-chatch.jpg" alt="image not found">
                    <div class="pro-p">
                        <h3>Apple watch</h3>
                        <p>$50</p>
                    </div>
                </div>
                <div class="product">
                    <img src="static/images/TUF-Gaming-A16.jpg" alt="image not found">
                    <div class="pro-p">
                        <h3>TUF gaming A16</h3>
                        <p>$400</p>
                    </div>
                </div>
            </div>
        </section>
        <section class="contact">
            <div class="contact-us">
                <div class="contact-p">
                    <p>
                        contact-us
                    </p>
                </div>
                <div class="input-contact">
                    <input type="text" placeholder="Full Name" class="full-name-contact">
                    <input type="email" placeholder="Email" class="email-contact">
                    <input type="text" placeholder="massage" class="massage-contact">
                    <button class="but">
                        Send massage
                    </button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer">
            <p class="footer-p">
                @ 2026 All copyright
            </p>
        </div>
    </footer>
</body>
</html>
